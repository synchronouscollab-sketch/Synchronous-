<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Call - Professional WebRTC Signaling</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Custom Mirror effect for self-view video */
    .mirror { transform: scaleX(-1); }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center font-sans antialiased">

  <div class="w-full max-w-xl mx-4">
    <div class="bg-slate-800 border border-slate-700 rounded-2xl shadow-2xl p-8 backdrop-blur-md backdrop-filter">
      
      <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">
          Nexus Call
        </h1>
        <p class="text-sm text-slate-400 mt-2">Secure, instant peer-to-peer communications</p>
      </div>

      <div id="auth-section" class="space-y-5">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Email Address</label>
          <input type="email" id="email" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-colors" placeholder="name@company.com">
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Password</label>
          <input type="password" id="password" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-blue-500 transition-colors" placeholder="••••••••">
        </div>

        <div class="grid grid-cols-2 gap-4 pt-2">
          <button id="btn-login" class="bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition duration-150 ease-in-out shadow-lg shadow-blue-600/20">
            Sign In
          </button>
          <button id="btn-signup" class="bg-slate-700 hover:bg-slate-600 active:bg-slate-800 text-slate-200 font-medium py-3 px-4 rounded-lg transition duration-150 ease-in-out">
            Create Account
          </button>
        </div>

        <div class="relative my-6 flex py-2 items-center text-xs uppercase tracking-wider text-slate-500">
          <div class="flex-grow border-t border-slate-700"></div>
          <span class="flex-shrink mx-4">or continue with</span>
          <div class="flex-grow border-t border-slate-700"></div>
        </div>

        <button id="btn-google" class="w-full flex items-center justify-center gap-3 bg-white hover:bg-slate-100 text-slate-900 font-medium py-3 px-4 rounded-lg transition duration-150 ease-in-out shadow-md">
          <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#EA4335" d="M12.24 10.285V14.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.866-3.577-7.866-8s3.536-8 7.866-8c2.46 0 4.105 1.025 5.047 1.926l3.227-3.11C18.432 1.145 15.66 0 12.24 0 5.48 0 0 5.373 0 12s5.48 12 12.24 12c7.06 0 11.76-4.909 11.76-11.83 0-.796-.086-1.401-.194-1.885H12.24z"/>
          </svg>
          Google Workspace
        </button>
      </div>

      <div id="app-section" class="hidden space-y-6">
        <div class="flex items-center justify-between bg-slate-900 border border-slate-700/50 rounded-xl p-4">
          <div class="overflow-hidden mr-2">
            <p class="text-xs text-slate-400 font-mono truncate" id="user-email">user@domain.com</p>
            <p class="text-lg font-bold text-emerald-400 tracking-widest mt-0.5" id="my-call-id">------</p>
          </div>
          <button id="btn-logout" class="text-xs font-medium text-slate-400 hover:text-rose-400 border border-slate-700 hover:border-rose-900 rounded-lg px-3 py-1.5 transition-colors">
            Disconnect
          </button>
        </div>

        <div class="bg-slate-900/50 border border-slate-700/40 rounded-xl p-5 space-y-4">
          <h3 class="text-sm font-semibold tracking-wide text-slate-300 uppercase">Initiate Outbound Session</h3>
          
          <div>
            <input type="text" id="remote-id" maxlength="6" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-center text-xl font-mono tracking-widest text-slate-100 placeholder-slate-600 focus:outline-none focus:border-indigo-500 transition-colors" placeholder="000000">
          </div>

          <label class="flex items-center gap-3 cursor-pointer py-1 group select-none">
            <input type="checkbox" id="enable-video" class="w-4 h-4 rounded border-slate-700 text-indigo-600 bg-slate-900 focus:ring-indigo-600 focus:ring-offset-slate-900">
            <span class="text-sm text-slate-400 group-hover:text-slate-200 transition-colors">Transmit Video Stream</span>
          </label>

          <button id="btn-start-call" class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-medium py-3 px-4 rounded-lg transition duration-150 ease-in-out shadow-lg shadow-indigo-600/20">
            Establish Connection
          </button>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div class="relative bg-slate-900 aspect-video rounded-xl overflow-hidden border border-slate-700/60">
            <video id="local-video" autoplay playsinline muted class="w-full h-full object-cover mirror bg-slate-950"></video>
            <span class="absolute bottom-2 left-2 px-2 py-0.5 bg-slate-900/80 backdrop-blur-sm rounded text-[10px] uppercase font-mono tracking-wider text-slate-300">Local Stream</span>
          </div>
          <div class="relative bg-slate-900 aspect-video rounded-xl overflow-hidden border border-slate-700/60">
            <video id="remote-video" autoplay playsinline class="w-full h-full object-cover bg-slate-950"></video>
            <span class="absolute bottom-2 left-2 px-2 py-0.5 bg-slate-900/80 backdrop-blur-sm rounded text-[10px] uppercase font-mono tracking-wider text-slate-300">Remote Stream</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
    import { getDatabase, ref, runTransaction, get, onValue, update, set, off } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

    // Standard Client Config Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyDbkG2e_p7Q_RHAoEHGVn8OC9jZU_E9XGM",
      authDomain: "agorateam.firebaseapp.com",
      projectId: "agorateam",
      storageBucket: "agorateam.firebasestorage.app",
      messagingSenderId: "215497316167",
      appId: "1:215497316167:web:490365993e80e565251e62"
    };

    // Initialization
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const googleProvider = new GoogleAuthProvider();

    // DOM UI Hooks
    const authSection = document.getElementById('auth-section');
    const appSection = document.getElementById('app-section');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const btnLogin = document.getElementById('btn-login');
    const btnSignup = document.getElementById('btn-signup');
    const btnGoogle = document.getElementById('btn-google');
    const btnLogout = document.getElementById('btn-logout');
    const userEmailDisplay = document.getElementById('user-email');
    const myCallIdDisplay = document.getElementById('my-call-id');
    const remoteIdInput = document.getElementById('remote-id');
    const btnStartCall = document.getElementById('btn-start-call');
    const enableVideoCheckbox = document.getElementById('enable-video');
    const localVideo = document.getElementById('local-video');
    const remoteVideo = document.getElementById('remote-video');

    // Global Interactive WebRTC State
    const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };
    let peerConnection = null;
    let localStream = null;
    let remoteStream = null;
    let myCallId = null;

    // --- Authentication Bindings ---
    btnGoogle.onclick = () => signInWithPopup(auth, googleProvider).catch(err => alert("Google Error: " + err.message));
    btnSignup.onclick = () => createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value).catch(err => alert(err.message));
    btnLogin.onclick = () => signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value).catch(err => alert(err.message));
    btnLogout.onclick = () => signOut(auth);

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        authSection.classList.add('hidden');
        appSection.classList.remove('hidden');
        userEmailDisplay.innerText = user.email || `UID: ${user.uid.substring(0,8)}`;
        await secureAssignUniqueCallId(user.uid);
        listenForIncomingCalls();
      } else {
        authSection.classList.remove('hidden');
        appSection.classList.add('hidden');
        if (myCallId) off(ref(db, `calls/${myCallId}`));
        cleanupCall();
      }
    });

    // --- Atomic Uniqueness Verification & ID Generator ---
    async function secureAssignUniqueCallId(uid) {
      myCallIdDisplay.innerText = "Synchronizing...";
      const userRef = ref(db, `users/${uid}`);
      const snapshot = await get(userRef);
      
      if (snapshot.exists()) {
        myCallId = snapshot.val().callId;
      } else {
        let isUniqueClaimed = false;
        while (!isUniqueClaimed) {
          const generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
          const targetGlobalIdRef = ref(db, `ids/${generatedCode}`);

          // Atomic execution prevents collision races
          const result = await runTransaction(targetGlobalIdRef, (currentData) => {
            if (currentData === null) {
              return uid; // Path is empty, secure registration by saving user ID
            }
            return; // Abort transaction if collision happens
          });

          if (result.committed) {
            myCallId = generatedCode;
            isUniqueClaimed = true;
            await update(userRef, { callId: myCallId });
          }
        }
      }
      myCallIdDisplay.innerText = myCallId;
    }

    // --- Hardware Access Pipeline ---
    async function setupMedia() {
      const videoConstraints = enableVideoCheckbox.checked;
      try {
        localStream = await navigator.mediaDevices.getUserMedia({
          audio: true,
          video: videoConstraints
        });
        localVideo.srcObject = localStream;
        
        remoteStream = new MediaStream();
        remoteVideo.srcObject = remoteStream;

        peerConnection = new RTCPeerConnection(servers);
        
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        peerConnection.ontrack = (event) => {
          event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
        };
      } catch (e) {
        alert("Media initiation failed: Ensure microphone/camera permissions are granted.");
        throw e;
      }
    }

    // --- Signaling & Connection Logic ---
    btnStartCall.onclick = async () => {
      const destinationId = remoteIdInput.value.trim();
      if (!destinationId || destinationId === myCallId) return alert("Please specify a valid tracking signature.");

      await setupMedia();
      const callRef = ref(db, `calls/${destinationId}`);

      peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
          update(ref(db, `calls/${destinationId}/callerCandidates`), { [Date.now()]: event.candidate.toJSON() });
        }
      };

      const localOffer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(localOffer);

      await set(callRef, {
        offer: { sdp: localOffer.sdp, type: localOffer.type, callerId: myCallId }
      });

      onValue(callRef, async (snapshot) => {
        const payload = snapshot.val();
        if (payload?.answer && !peerConnection.currentRemoteDescription) {
          await peerConnection.setRemoteDescription(new RTCSessionDescription(payload.answer));
        }
        if (payload?.calleeCandidates) {
          Object.values(payload.calleeCandidates).forEach(cand => {
            peerConnection.addIceCandidate(new RTCIceCandidate(cand)).catch(() => {});
          });
        }
      });
    };

    function listenForIncomingCalls() {
      onValue(ref(db, `calls/${myCallId}`), async (snapshot) => {
        const payload = snapshot.val();
        
        if (payload?.offer && !peerConnection) {
          if (confirm(`Incoming high-priority connection from peer: ${payload.offer.callerId}. Accept handshake?`)) {
            await setupMedia();

            peerConnection.onicecandidate = (event) => {
              if (event.candidate) {
                update(ref(db, `calls/${myCallId}/calleeCandidates`), { [Date.now()]: event.candidate.toJSON() });
              }
            };

            await peerConnection.setRemoteDescription(new RTCSessionDescription(payload.offer));
            const localAnswer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(localAnswer);

            await update(ref(db, `calls/${myCallId}`), {
              answer: { type: localAnswer.type, sdp: localAnswer.sdp }
            });

            if (payload.callerCandidates) {
              Object.values(payload.callerCandidates).forEach(cand => {
                peerConnection.addIceCandidate(new RTCIceCandidate(cand)).catch(() => {});
              });
            }
          } else {
            await set(ref(db, `calls/${myCallId}`), null);
          }
        }
      });
    }

    function cleanupCall() {
      if (localStream) localStream.getTracks().forEach(t => t.stop());
      if (peerConnection) peerConnection.close();
      peerConnection = null;
      localVideo.srcObject = null;
      remoteVideo.srcObject = null;
    }
  </script>
</body>
</html>
